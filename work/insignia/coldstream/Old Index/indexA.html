<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    :root {
      --cream: #f5f0e8;
      --dark: #0a0a0f;
      --accent: #c8a96e;
      --muted: rgba(245, 240, 232, 0.55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    #video-stage {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh; z-index: 0;
    }

    #bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #video-stage::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.5) 100%),
        linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, transparent 15%, transparent 80%, rgba(10,10,15,0.7) 100%);
      pointer-events: none;
    }

    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #e8d5a3);
      z-index: 100; transition: width 0.05s linear;
    }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #hud-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 3rem;
      background: rgba(10,10,15,0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      border-bottom: 1px solid rgba(200,169,110,0);
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      pointer-events: all;
    }

    #hud-bar.scrolled {
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom-color: rgba(200,169,110,0.1);
    }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.18em; color: var(--cream); opacity: 0.9;
    }

    .caption-top {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #progress-pct {
      position: absolute; bottom: 2.8rem; right: 3rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.18em;
      color: var(--accent); opacity: 0.85;
    }

    #scroll-cue {
      position: absolute; bottom: 2.8rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s ease;
    }

    #scroll-cue span {
      font-size: 0.62rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }

    .scroll-arrow {
      width: 18px; height: 18px;
      border-right: 1.5px solid var(--accent);
      border-bottom: 1.5px solid var(--accent);
      transform: rotate(45deg);
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 1; }
      50%       { transform: rotate(45deg) translate(4px,4px); opacity: 0.5; }
    }

    #scroll-content { position: relative; z-index: 10; }

    #hero {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9; letter-spacing: 0.04em; color: var(--cream);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.25);
    }

    #hero p {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent);
      background: rgba(10,10,15,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 0.45rem 1.2rem;
      border-radius: 1px;
    }

    .content-section { padding: 7rem 0; }

    .section-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .text-block {
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 2px; padding: 3.5rem 4rem;
    }

    .section-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem;
    }

    .section-inner h2, .timeline-header h2, .gallery-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.92; letter-spacing: 0.04em;
      color: var(--cream); margin-bottom: 2.5rem;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3rem; margin-top: 3rem; }

    .content-section p, .timeline-content p {
      font-size: 1rem; line-height: 1.85; color: var(--muted); font-weight: 300;
    }

    .card { border-top: 1px solid rgba(200,169,110,0.25); padding-top: 2rem; }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.08em;
      color: var(--cream); margin-bottom: 1rem;
    }

    .stat-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 2rem; margin-top: 3rem;
      border-top: 1px solid rgba(200,169,110,0.12); padding-top: 3rem;
    }

    .stat {
      display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem;
    }

    .stat-icon {
      width: 48px; height: 48px;
      margin-bottom: 0.25rem;
    }

    .stat-icon svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    .stat-icon svg path, .stat-icon svg circle, .stat-icon svg line, .stat-icon svg polyline {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--dash-len, 200);
      stroke-dashoffset: var(--dash-len, 200);
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat.fired .stat-icon svg path,
    .stat.fired .stat-icon svg circle,
    .stat.fired .stat-icon svg line,
    .stat.fired .stat-icon svg polyline {
      stroke-dashoffset: 0;
    }

    .stat h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--accent); letter-spacing: 0.04em; line-height: 1;
      opacity: 0; transition: opacity 0.4s ease 0.5s;
    }

    .stat.fired h4 { opacity: 1; }

    .stat p {
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-top: 0.1rem;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease 0.7s, transform 0.4s ease 0.7s;
    }

    .stat.fired p { opacity: 1; transform: translateY(0); }

    .text-image-right, .text-image-left {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;
    }

    .text-image-right .ti-text h2,
    .text-image-left .ti-text h2 { margin-bottom: 1.5rem; }

    .text-image-right .ti-image img,
    .text-image-left .ti-image img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; border-radius: 2px; display: block;
    }

    .text-image-left .ti-image { order: -1; }

    .section-fullbleed { padding: 7rem 0; }

    .fullbleed-wrap { position: relative; max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .fullbleed-wrap img {
      width: 100%; max-height: 85vh;
      object-fit: cover; display: block; border-radius: 2px;
    }

    .fullbleed-caption {
      position: absolute; bottom: 1rem; right: 3.75rem;
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      background: rgba(10,10,15,0.5); backdrop-filter: blur(6px);
      padding: 0.4rem 0.8rem; border-radius: 1px;
    }

    .pull-quote { padding: 0.5rem 0; max-width: 900px; margin: 0 auto; }

    .pull-quote blockquote {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05; letter-spacing: 0.03em; color: var(--cream);
      border-left: 2px solid var(--accent); padding-left: 2.5rem;
    }

    .pull-quote cite {
      display: block; margin-top: 1.5rem; padding-left: 2.5rem;
      font-size: 0.68rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--accent); font-style: normal;
    }

    .gallery-section { padding: 7rem 0; }

    .gallery-inner { max-width: 1200px; margin: 0 auto; padding: 0 3rem; }

    .gallery-header { margin-bottom: 2.5rem; }

    .gallery-label {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
    }

    .gallery-grid { columns: 3; column-gap: 0.75rem; }

    .gallery-item {
      break-inside: avoid; margin-bottom: 0.75rem;
      position: relative; overflow: hidden; cursor: pointer;
    }

    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-item::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,15,0); transition: background 0.3s ease;
    }

    .gallery-item:hover::after { background: rgba(10,10,15,0.25); }

    #lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,10,15,0.95); backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 2px; }

    #lightbox-close {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 1.5rem; color: var(--muted);
      cursor: pointer; background: none; border: none; line-height: 1; transition: color 0.2s;
    }

    #lightbox-close:hover { color: var(--cream); }

    #lightbox-prev, #lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(200,169,110,0.2);
      color: var(--accent); font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em;
      padding: 0.6rem 1rem; cursor: pointer; transition: border-color 0.2s; border-radius: 1px;
    }

    #lightbox-prev { left: 2rem; }
    #lightbox-next { right: 2rem; }
    #lightbox-prev:hover, #lightbox-next:hover { border-color: var(--accent); color: var(--cream); }

    #lightbox-count {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.22em; color: var(--muted);
    }

    .timeline-section { padding: 7rem 0; }

    .timeline-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .timeline-header { margin-bottom: 4rem; }

    .timeline-track { display: grid; grid-template-columns: 60px 1fr; gap: 0 2.5rem; }

    .timeline-spine { display: flex; flex-direction: column; align-items: center; }

    .timeline-node {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem;
      letter-spacing: 0.1em; color: var(--accent); flex-shrink: 0;
      background: rgba(10,10,15,0.8); backdrop-filter: blur(4px);
    }

    .timeline-line {
      width: 1px; flex: 1; min-height: 3rem;
      background: linear-gradient(to bottom, rgba(200,169,110,0.3), rgba(200,169,110,0.05));
      margin: 0.5rem 0;
    }

    .timeline-content { padding-bottom: 4rem; }

    .timeline-content h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      letter-spacing: 0.06em; color: var(--cream);
      line-height: 1; margin-bottom: 1rem; margin-top: 0.4rem;
    }

    .timeline-content .step-image { margin-top: 1.5rem; max-width: 580px; }
    .timeline-content .step-image img { width: 100%; border-radius: 2px; display: block; }

    footer {
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(200,169,110,0.12);
      padding: 5rem 3rem; text-align: center;
      position: relative; z-index: 10;
    }

    footer .footer-wordmark {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 0.18em;
      color: var(--cream); opacity: 0.15; margin-bottom: 1rem;
    }

    footer p {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #loading {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 200; transition: opacity 0.6s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 1.5px solid rgba(200,169,110,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading span {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
    }

    @media (max-width: 768px) {
      .two-col, .text-image-right, .text-image-left { grid-template-columns: 1fr; gap: 2rem; }
      .three-col { grid-template-columns: 1fr; }
      .text-image-left .ti-image { order: 0; }
      .gallery-grid { columns: 2; }
      .text-block { padding: 2.5rem 2rem; }
      .caption-top { display: none; }
      #progress-pct { bottom: 1.5rem; right: 1.5rem; }
      #hud-bar { padding: 1.5rem; }
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-item.reveal { transition-duration: 0.6s; }
    .gallery-item.reveal:nth-child(2) { transition-delay: 0.08s; }
    .gallery-item.reveal:nth-child(3) { transition-delay: 0.16s; }
    .gallery-item.reveal:nth-child(4) { transition-delay: 0.06s; }
    .gallery-item.reveal:nth-child(5) { transition-delay: 0.14s; }
    .gallery-item.reveal:nth-child(6) { transition-delay: 0.22s; }
    .gallery-item.reveal:nth-child(7) { transition-delay: 0.04s; }
    .gallery-item.reveal:nth-child(8) { transition-delay: 0.12s; }
    .gallery-item.reveal:nth-child(9) { transition-delay: 0.20s; }

    .timeline-content.reveal:nth-child(4)  { transition-delay: 0.10s; }
    .timeline-content.reveal:nth-child(6)  { transition-delay: 0.15s; }
    .timeline-content.reveal:nth-child(8)  { transition-delay: 0.20s; }
    .timeline-content.reveal:nth-child(10) { transition-delay: 0.25s; }
  </style>
</head>

  <script>
  /* ── Helpers ── */
  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function mkImg(src, alt) {
    const i = document.createElement('img');
    i.src = src; i.alt = alt || ''; i.loading = 'lazy';
    return i;
  }

  /* ── Identity ── */
  document.title = CONFIG.title;
  document.getElementById('hud-wordmark').textContent = CONFIG.wordmark;
  document.getElementById('hud-caption').textContent  = CONFIG.caption;
  document.getElementById('bg-video').src             = CONFIG.video;

  const heroTitle = document.getElementById('hero-title');
  heroTitle.innerHTML = CONFIG.heroLine2
    ? CONFIG.heroLine1 + '<br>' + CONFIG.heroLine2
    : CONFIG.heroLine1;
  document.getElementById('hero-sub').textContent = CONFIG.heroSub;

  /* ── Section builders ── */
  const main = document.getElementById('scroll-content');

  function appendSection(inner, sectionCls) {
    const s  = el('section', sectionCls || 'content-section');
    const si = el('div', 'section-inner');
    si.appendChild(inner);
    s.appendChild(si);
    main.appendChild(s);
  }

  function makeTextBlock(children, showChapter, chapterText) {
    const tb = el('div', 'text-block');
    if (showChapter && chapterText) tb.appendChild(el('p', 'section-label', chapterText));
    children.forEach(c => tb.appendChild(c));
    return tb;
  }

  /* Pull quote */
  if (CONFIG.sections.pullQuote) {
    const pq = el('div', 'pull-quote');
    pq.appendChild(el('blockquote', '', CONFIG.content.pullQuote));
    pq.appendChild(el('cite', '', CONFIG.content.pullQuoteCite));
    appendSection(makeTextBlock([pq]));
  }

  /* Intro */
  if (CONFIG.sections.intro) {
    const c  = CONFIG.content.intro;
    const tc = el('div', 'two-col');
    tc.appendChild(el('h2', '', c.heading));
    tc.appendChild(el('p', '', c.body));
    appendSection(makeTextBlock([tc], c.showChapter, c.chapter));
  }

  /* Text + image right */
  if (CONFIG.sections.textImageR) {
    const c  = CONFIG.content.textImageR;
    const ti = el('div', 'text-image-right');
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    ti.appendChild(tt); ti.appendChild(td);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Full width image */
  if (CONFIG.sections.fullbleed) {
    const c  = CONFIG.content.fullbleed;
    const s  = el('section', 'content-section section-fullbleed');
    const fw = el('div', 'fullbleed-wrap');
    fw.appendChild(mkImg(c.image, c.caption));
    if (c.caption) fw.appendChild(el('span', 'fullbleed-caption', c.caption));
    s.appendChild(fw);
    main.appendChild(s);
  }

  /* Timeline */
  if (CONFIG.sections.timeline) {
    const c     = CONFIG.content.timeline;
    const s     = el('section', 'timeline-section');
    const ti    = el('div', 'timeline-inner');
    const tb    = el('div', 'text-block');
    if (c.showChapter && c.chapter) tb.appendChild(el('p', 'section-label', c.chapter));
    const th = el('div', 'timeline-header');
    th.appendChild(el('h2', '', c.heading));
    tb.appendChild(th);
    const track = el('div', 'timeline-track');
    c.steps.forEach((step, i) => {
      const spine = el('div', 'timeline-spine');
      spine.appendChild(el('div', 'timeline-node', step.n));
      if (i < c.steps.length - 1) spine.appendChild(el('div', 'timeline-line'));
      const content = el('div', 'timeline-content');
      content.appendChild(el('h3', '', step.title));
      content.appendChild(el('p', '', step.body));
      if (step.image) {
        const si = el('div', 'step-image');
        si.appendChild(mkImg(step.image, step.title));
        content.appendChild(si);
      }
      track.appendChild(spine);
      track.appendChild(content);
    });
    tb.appendChild(track);
    ti.appendChild(tb);
    s.appendChild(ti);
    main.appendChild(s);
  }

  /* Text + image left */
  if (CONFIG.sections.textImageL) {
    const c  = CONFIG.content.textImageL;
    const ti = el('div', 'text-image-left');
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    ti.appendChild(td); ti.appendChild(tt);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Gallery */
  if (CONFIG.sections.gallery) {
    const c    = CONFIG.content.gallery;
    const s    = el('section', 'gallery-section');
    const gi   = el('div', 'gallery-inner');
    const gh   = el('div', 'gallery-header');
    gh.appendChild(el('p', 'gallery-label', c.label));
    gh.appendChild(el('h2', '', c.heading));
    gi.appendChild(gh);
    const grid = el('div', 'gallery-grid');
    c.images.forEach((src, i) => {
      const item = el('div', 'gallery-item');
      item.dataset.index = i;
      item.appendChild(mkImg(src, 'Image ' + (i + 1)));
      grid.appendChild(item);
    });
    gi.appendChild(grid);
    s.appendChild(gi);
    main.appendChild(s);
  }

  /* Stats */
  if (CONFIG.sections.stats) {
    const c  = CONFIG.content.stats;
    const tc = el('div', 'two-col');
    tc.appendChild(el('h2', '', c.heading));
    tc.appendChild(el('p', '', c.body));
    const sr = el('div', 'stat-row');

    const ICONS = {
      aperture: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="18" style="--dash-len:114"/>
        <line x1="24" y1="6"  x2="16" y2="24" style="--dash-len:40"/>
        <line x1="24" y1="6"  x2="32" y2="24" style="--dash-len:40"/>
        <line x1="6"  y1="27" x2="24" y2="20" style="--dash-len:40"/>
        <line x1="6"  y1="27" x2="16" y2="38" style="--dash-len:40"/>
        <line x1="24" y1="42" x2="32" y2="24" style="--dash-len:40"/>
        <line x1="24" y1="42" x2="16" y2="28" style="--dash-len:40"/>
        <line x1="42" y1="27" x2="24" y2="20" style="--dash-len:40"/>
        <line x1="42" y1="27" x2="32" y2="38" style="--dash-len:40"/>
      </svg>`,
      light: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="22" r="8" style="--dash-len:52"/>
        <line x1="24" y1="6"  x2="24" y2="2"  style="--dash-len:10"/>
        <line x1="24" y1="38" x2="24" y2="42" style="--dash-len:10"/>
        <line x1="8"  y1="22" x2="4"  y2="22" style="--dash-len:10"/>
        <line x1="40" y1="22" x2="44" y2="22" style="--dash-len:10"/>
        <line x1="13" y1="11" x2="10" y2="8"  style="--dash-len:10"/>
        <line x1="35" y1="11" x2="38" y2="8"  style="--dash-len:10"/>
        <line x1="13" y1="33" x2="10" y2="36" style="--dash-len:10"/>
        <line x1="35" y1="33" x2="38" y2="36" style="--dash-len:10"/>
        <line x1="18" y1="38" x2="30" y2="38" style="--dash-len:16"/>
        <line x1="20" y1="43" x2="28" y2="43" style="--dash-len:12"/>
      </svg>`,
      layers: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,24 24,14 44,24" style="--dash-len:60"/>
        <polyline points="4,24 24,34 44,24" style="--dash-len:60"/>
        <polyline points="4,32 24,42 44,32" style="--dash-len:60"/>
        <polyline points="4,16 24,6  44,16" style="--dash-len:60"/>
      </svg>`,
      frames: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="6"  y="6"  width="36" height="36" rx="2" style="--dash-len:145"/>
        <rect x="13" y="13" width="22" height="22" rx="1" style="--dash-len:90"/>
        <circle cx="24" cy="24" r="4" style="--dash-len:26"/>
      </svg>`,
      clock: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="18" style="--dash-len:114"/>
        <line x1="24" y1="24" x2="24" y2="12" style="--dash-len:14"/>
        <line x1="24" y1="24" x2="33" y2="29" style="--dash-len:12"/>
      </svg>`,
      diamond: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <polyline points="24,4 44,24 24,44 4,24 24,4" style="--dash-len:115"/>
        <polyline points="24,4 24,44"  style="--dash-len:40"/>
        <polyline points="4,24 44,24"  style="--dash-len:40"/>
        <polyline points="14,14 34,34" style="--dash-len:30"/>
        <polyline points="34,14 14,34" style="--dash-len:30"/>
      </svg>`,
      pen: `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <polyline points="8,40 16,32 32,16 38,10" style="--dash-len:60"/>
        <polyline points="38,10 42,6 42,10 38,10" style="--dash-len:20"/>
        <polyline points="16,32 8,40 12,40 16,36" style="--dash-len:20"/>
        <line x1="26" y1="10" x2="38" y2="22" style="--dash-len:20"/>
      </svg>`,
    };

    c.items.forEach((item, idx) => {
      const st   = el('div', 'stat');
      st.dataset.target = item.value;
      st.dataset.delay  = idx * 150;

      const iconWrap = el('div', 'stat-icon');
      iconWrap.innerHTML = ICONS[item.icon] || ICONS.diamond;
      st.appendChild(iconWrap);

      const num = el('h4', '', '0');
      num.dataset.countTo = item.value;
      st.appendChild(num);
      st.appendChild(el('p', '', item.label));
      sr.appendChild(st);
    });

    appendSection(makeTextBlock([tc, sr], c.showChapter, c.chapter));
  }

  /* Footer */
  const footer = el('footer');
  footer.appendChild(el('span', 'footer-wordmark', CONFIG.wordmark));
  footer.appendChild(el('p', '', CONFIG.footerCaption));
  main.appendChild(footer);

  /* ── Scroll + video ── */
  const video       = document.getElementById('bg-video');
  const progressBar = document.getElementById('progress-bar');
  const scrollCue   = document.getElementById('scroll-cue');
  const pct         = document.getElementById('progress-pct');
  const loading     = document.getElementById('loading');
  const hudBar      = document.getElementById('hud-bar');

  video.addEventListener('loadedmetadata', () => loading.classList.add('hidden'));
  if (video.readyState >= 1) loading.classList.add('hidden');
  setTimeout(() => loading.classList.add('hidden'), 3000);

  function onScroll() {
    const scrollTop = window.scrollY;
    const scrollMax = document.body.scrollHeight - window.innerHeight;
    const progress  = Math.min(Math.max(scrollTop / scrollMax, 0), 1);
    if (video.duration && isFinite(video.duration)) {
      const target = progress * video.duration;
      if (Math.abs(video.currentTime - target) > 0.01) video.currentTime = target;
    }
    video.style.opacity = 1 - (progress * 0.9);
    progressBar.style.width = (progress * 100) + '%';
    pct.textContent = Math.round(progress * 100) + '%';
    scrollCue.style.opacity = scrollTop > 40 ? '0' : '1';
    hudBar.classList.toggle('scrolled', scrollTop > 40);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lightbox-img');
  const lbCount = document.getElementById('lightbox-count');
  let current   = 0;

  function getItems() { return Array.from(document.querySelectorAll('.gallery-item')); }

  function openLightbox(i) {
    const items = getItems();
    current = i;
    lbImg.src = items[i].querySelector('img').src;
    lbCount.textContent = (i + 1) + ' / ' + items.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showSlide(i) {
    const items = getItems();
    current = (i + items.length) % items.length;
    lbImg.src = items[current].querySelector('img').src;
    lbCount.textContent = (current + 1) + ' / ' + items.length;
  }

  document.addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (item) openLightbox(+item.dataset.index);
  });

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); showSlide(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); showSlide(current + 1); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showSlide(current - 1);
    if (e.key === 'ArrowRight') showSlide(current + 1);
  });

  /* ── Stat animation ── */
  function countUp(numEl, target, duration) {
    const isFloat = target % 1 !== 0;
    const start   = performance.now();
    function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val  = target * ease;
      numEl.textContent = isFloat ? val.toFixed(1) : Math.round(val);
      if (t < 1) requestAnimationFrame(tick);
      else numEl.textContent = isFloat ? target.toFixed(1) : target;
    }
    requestAnimationFrame(tick);
  }

  const statObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const st    = entry.target;
      const delay = +st.dataset.delay || 0;
      setTimeout(() => {
        st.classList.add('fired');
        const numEl  = st.querySelector('h4');
        const target = parseFloat(numEl.dataset.countTo);
        countUp(numEl, target, 1200);
      }, delay);
      statObserver.unobserve(st);
    });
  }, { threshold: 0.3 });

  /* ── Scroll reveal ── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  // Observe after sections are built
  requestAnimationFrame(() => {
    document.querySelectorAll(
      '.text-block, .ti-image img, .fullbleed-wrap img, .step-image img, .gallery-item, .timeline-content, .pull-quote'
    ).forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
    document.querySelectorAll('.stat').forEach(st => statObserver.observe(st));
  });
  </script>

</body>
</html>
