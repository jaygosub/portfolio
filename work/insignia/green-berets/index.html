<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    :root {
      --cream: #f5f0e8;
      --dark: #0a0a0f;
      --accent: #c8a96e;
      --muted: rgba(245, 240, 232, 0.55);
      --panel-max: 1000px;
      --panel-pad: 3rem;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Video stage ── */
    #video-stage {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh; z-index: 0;
    }

    #bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #video-stage::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.5) 100%),
        linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, transparent 15%, transparent 80%, rgba(10,10,15,0.7) 100%);
      pointer-events: none;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #e8d5a3);
      z-index: 100; transition: width 0.05s linear;
    }

    /* ── HUD ── */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #hud-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      background: rgba(10,10,15,0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      border-bottom: 1px solid rgba(200,169,110,0);
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      pointer-events: all;
    }

    .caption-top { margin-left: auto; }

    #hud-bar.scrolled {
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom-color: rgba(200,169,110,0.1);
    }

    .hud-nav {
      display: flex; align-items: center;
      gap: 0.75rem; pointer-events: all;
    }

    .hud-nav a {
      display: flex; align-items: center;
      gap: 0.5rem;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
      padding: 0.3rem 0;
    }

    .hud-nav a:hover { color: var(--accent); }

    .hud-nav a svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .hud-nav-sep {
      width: 1px; height: 12px;
      background: rgba(200,169,110,0.2);
    }

    .hud-nav-index {
      font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(200,169,110,0.4);
      text-decoration: none; transition: color 0.2s;
      pointer-events: all;
    }

    .hud-nav-index:hover { color: var(--accent); }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.18em; color: var(--cream); opacity: 0.9;
    }

    .caption-top {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #progress-pct {
      position: absolute; bottom: 2.8rem; right: 3rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.18em;
      color: var(--accent); opacity: 0.85;
    }

    #scroll-cue {
      position: absolute; bottom: 2.8rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s ease;
    }

    #scroll-cue span {
      font-size: 0.62rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }

    .scroll-arrow {
      width: 18px; height: 18px;
      border-right: 1.5px solid var(--accent);
      border-bottom: 1.5px solid var(--accent);
      transform: rotate(45deg);
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 1; }
      50%       { transform: rotate(45deg) translate(4px,4px); opacity: 0.5; }
    }

    /* ── Layout ── */
    #scroll-content { position: relative; z-index: 10; }

    #hero {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9; letter-spacing: 0.04em; color: var(--cream);
      position: relative;
    }

    #hero h1::before {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: rgba(0,0,0,.75);
      filter: blur(10px) brightness(0);
      opacity: 1;
      transform: translateY(6px) scaleY(0.98);
      z-index: -1; pointer-events: none;
    }

    #hero p {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent);
      background: rgba(10,10,15,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 0.45rem 1.2rem; border-radius: 1px;
    }

    .content-section { padding: 7rem 0; }

    .section-inner { max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .text-block {
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 2px; padding: 3.5rem 4rem;
    }

    .section-label {
      font-size: 0.65rem; line-height: 0.65; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem;
    }

    .section-inner h2, .timeline-header h2, .gallery-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.92; letter-spacing: 0.04em;
      color: var(--cream); margin-bottom: 2.5rem;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3rem; margin-top: 3rem; }

    /* Stacked intro layout — full-width title + body, no side-by-side split */
    .intro-stacked { display: flex; flex-direction: column; gap: 1.5rem; }
    .intro-stacked h2 { margin-bottom: 0; }

    .content-section p, .timeline-content p {
      font-size: 1rem; line-height: 1.45; color: var(--muted); font-weight: 300;
    }

    .card { border-top: 1px solid rgba(200,169,110,0.25); padding-top: 2rem; }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.08em;
      color: var(--cream); margin-bottom: 1rem;
    }

    /* ── Stats ── */
    .stat-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 2rem; margin-top: 3rem;
      border-top: 1px solid rgba(200,169,110,0.12); padding-top: 3rem;
    }

    .stat { display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem; }

    .stat-icon { width: 48px; height: 48px; margin-bottom: 0.25rem; }

    .stat-icon svg { width: 100%; height: 100%; overflow: visible; }

    .stat-icon svg path, .stat-icon svg circle, .stat-icon svg line, .stat-icon svg polyline {
      fill: none; stroke: var(--accent); stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: var(--dash-len, 200);
      stroke-dashoffset: var(--dash-len, 200);
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat.fired .stat-icon svg path,
    .stat.fired .stat-icon svg circle,
    .stat.fired .stat-icon svg line,
    .stat.fired .stat-icon svg polyline { stroke-dashoffset: 0; }

    .stat h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--accent); letter-spacing: 0.04em; line-height: 1;
      opacity: 0; transition: opacity 0.4s ease 0.5s;
    }

    .stat.fired h4 { opacity: 1; }

    .stat p {
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-top: 0.1rem;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease 0.7s, transform 0.4s ease 0.7s;
    }

    .stat.fired p { opacity: 1; transform: translateY(0); }

    /* ── Text + Image ── */
    .text-image-right, .text-image-left {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;
    }

    .text-image-right .ti-text h2,
    .text-image-left .ti-text h2 { margin-bottom: 1.5rem; }

    .text-image-right .ti-image img,
    .text-image-left .ti-image img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; border-radius: 2px; display: block;
    }

    .text-image-left .ti-image { order: -1; }

    /* ── Fullbleed ── */
    .section-fullbleed { padding: 7rem 0; }

    .fullbleed-wrap { position: relative; max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .fullbleed-wrap img {
      width: 100%; max-height: 85vh;
      object-fit: cover; display: block; border-radius: 2px;
    }

    .fullbleed-caption {
      position: absolute; bottom: 1rem; right: calc(var(--panel-pad) + 0.75rem);
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      background: rgba(10,10,15,0.5); backdrop-filter: blur(6px);
      padding: 0.4rem 0.8rem; border-radius: 1px;
    }

    /* ── Pull quote ── */
    .pull-quote { padding: 0.5rem 0; max-width: 900px; margin: 0 auto; }

    .pull-quote blockquote {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05; letter-spacing: 0.03em; color: var(--cream);
      border-left: 2px solid var(--accent); padding-left: 2.5rem;
    }

    .pull-quote cite {
      display: block; margin-top: 1.5rem; padding-left: 2.5rem;
      font-size: 0.68rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--accent); font-style: normal;
    }

    /* ── Gallery ── */
    .gallery-section { padding: 7rem 0; }

    .gallery-inner { max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .gallery-header { margin-bottom: 2.5rem; }

    .gallery-label {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
    }

    .gallery-grid { columns: 3; column-gap: 0; }

    .gallery-item {
      break-inside: avoid; margin-bottom: 0;
      position: relative; overflow: hidden; cursor: pointer;
    }

    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-item::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,15,0); transition: background 0.3s ease;
    }

    .gallery-item:hover::after { background: rgba(10,10,15,0.6); }

    /* Centred click indicator — accent cross */
    .gallery-item::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: 25px; height: 25px;
      background:
        linear-gradient(var(--accent), var(--accent)) center/5px 100% no-repeat,
        linear-gradient(var(--accent), var(--accent)) center/100% 5px no-repeat;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 1;
      pointer-events: none;
    }

    .gallery-item:hover::before {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,10,15,0.95); backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 2px; }

    #lightbox-close {
      position: absolute; top: 2rem; right: 2.5rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); transition: color 0.2s; padding: 0.5rem;
    }

    #lightbox-close svg {
      width: 22px; height: 22px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round;
    }

    #lightbox-close:hover { color: var(--cream); }

    #lightbox-prev, #lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); transition: color 0.2s; padding: 1rem;
    }

    #lightbox-prev svg, #lightbox-next svg {
      width: 28px; height: 28px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    #lightbox-prev { left: 1.5rem; }
    #lightbox-next { right: 1.5rem; }
    #lightbox-prev:hover, #lightbox-next:hover { color: var(--accent); }

    #lightbox-dots {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.5rem; align-items: center;
    }

    .lb-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(245,240,232,0.3);
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .lb-dot.active {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* ── Timeline ── */
    .timeline-section { padding: 7rem 0; }

    .timeline-inner { max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .timeline-header { margin-bottom: 4rem; }

    /* Steps: clean stacked layout — no roundels, no spine */
    .timeline-steps { display: flex; flex-direction: column; gap: 3.5rem; }

    .timeline-step { display: flex; flex-direction: column; gap: 0.6rem; }

    .timeline-step-label {
      font-size: 0.62rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--accent);
      display: none; /* numbers removed per design */
    }

    .timeline-content { /* kept for reveal observer compat */ }

    .timeline-content h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      letter-spacing: 0.06em; color: var(--cream);
      line-height: 1; margin-bottom: 0.25rem;
    }

    .timeline-content p {
      font-size: 1rem; line-height: 1.45; color: var(--muted); font-weight: 300;
    }

    .timeline-content .step-image { margin-top: 1rem; width: 100%; }
    .timeline-content .step-image img { width: 100%; border-radius: 2px; display: block; }

    /* ── Footer ── */
    footer {
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(200,169,110,0.12);
      padding: 5rem 3rem; text-align: center;
      position: relative; z-index: 10;
    }

    footer .footer-wordmark {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 0.18em;
      color: var(--cream); opacity: 0.15; margin-bottom: 1rem;
    }

    footer p {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 200; transition: opacity 0.6s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 1.5px solid rgba(200,169,110,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading span {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ── Annotated / Badge diagram section ── */
    .annotated-section { padding: 7rem 0; }

    .annotated-inner { max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .annotated-block {
      background: rgba(10,10,15,0.52);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(200,169,110,0.1);
      border-radius: 2px;
      padding: 3.5rem 4rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .badge-ghost {
      position: absolute; right: -4%; top: 50%;
      transform: translateY(-50%); width: 52%;
      opacity: 0.05; mix-blend-mode: screen;
      pointer-events: none; user-select: none;
    }

    .badge-ghost img { width: 100%; height: auto; display: block; }

    .annotated-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 3rem;
    }

    .annotated-diagram { display: flex; align-items: flex-start; gap: 3rem; }

    .badge-svg-wrap { position: relative; flex: 0 0 42%; max-width: 320px; }

    .badge-svg-wrap svg.badge-svg {
      width: 100%; height: auto; display: block;
      filter: drop-shadow(0 0 50px rgba(200,169,110,0.08));
    }

    .callout-list {
      flex: 1; display: flex; flex-direction: column;
      gap: 1.8rem; padding-right: 4rem; min-width: 0;
    }

    .callout-float {
      opacity: 0; transform: translateX(8px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .callout-float.visible { opacity: 1; transform: translateX(0); }

    .callout-float-label {
      font-family: 'DM Sans', sans-serif;
      font-size: .65rem; letter-spacing: 0.35em;
      color: rgb(200,169,110); line-height: 1.1;
      margin-bottom: 0.3rem; text-transform: uppercase;
    }

    .callout-float-desc { font-size: 0.9rem; line-height: 1.4; color: rgba(245,240,232,0.45); }

    .badge-svg .draw-stroke {
      fill: none; stroke: #f5f0e8;
      stroke-dasharray: var(--dl, 2000);
      stroke-dashoffset: var(--dl, 2000);
      transition: stroke-dashoffset 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      transition-delay: var(--dd, 0s);
    }

    .badge-svg .draw-fill {
      opacity: 0; transition: opacity 0.7s ease;
      transition-delay: var(--dd, 0s);
    }

    .badge-svg.drawn .draw-stroke { stroke-dashoffset: 0; }
    .badge-svg.drawn .draw-fill   { opacity: 1; }

    .badge-svg g[data-highlight-group] {
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    /* ── Panel sections ── */
    .panel-section { padding: 7rem 0; position: relative; z-index: 10; }

    .panel-inner { max-width: var(--panel-max); margin: 0 auto; padding: 0 var(--panel-pad); }

    .panel-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent);
      display: block; margin-bottom: 1.2rem;
    }

    .panel-heading {
      font-family: 'Bebas Neue', sans-serif;
      line-height: 0.92; letter-spacing: 0.04em; color: var(--cream);
    }

    .panel-body { font-size: 1rem; line-height: 1.85; color: var(--muted); font-weight: 300; }

    .panel-rule {
      border: none; border-top: 1px solid rgba(245,240,232,0.12); margin: 4rem 0;
    }

    /* Panel A — Royal Navy */
    .rn-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 2rem; }
    .rn-panel .panel-body    { max-width: 68ch; margin-bottom: 4rem; }

    .rn-badge-primary  { display: flex; justify-content: center; padding: 0 60px; }
    .rn-badge-primary img  { width: 100%; max-width: 520px; height: auto; display: block; }

    .rn-symmetry-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.1em;
      color: var(--cream); text-align: center;
      display: block; margin-bottom: 1rem;
    }

    .rn-symmetry-caption {
      font-size: 0.85rem; font-weight: 300;
      color: var(--muted); text-align: center;
      display: block; margin-bottom: 3rem;
    }

    .rn-badge-secondary { display: flex; justify-content: center; padding: 0 120px; }
    .rn-badge-secondary img { width: 100%; max-width: 360px; height: auto; display: block; }

    /* Panel B — SBS */
    .sbs-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 3rem; }

    .sbs-image-wrap { width: 100%; margin-bottom: 2.5rem; }
    .sbs-image-wrap img { width: 100%; height: auto; display: block; }

    .sbs-captions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }

    .sbs-caption-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem; padding: 0 1rem;
    }

    .sbs-caption-col__label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); text-align: center;
    }

    .sbs-caption-col__text {
      font-size: 0.9rem; font-weight: 300;
      color: var(--muted); text-align: center; line-height: 1.55;
    }

  document.getElementById('hud-caption').textContent  = CONFIG.caption;
  document.getElementById('bg-video').src             = CONFIG.video;

  /* ── HUD navigation ── */
  const hudNav = document.getElementById('hud-nav');
  const n = CONFIG.nav;

  function navSep() {
    const sep = document.createElement('span');
    sep.className = 'hud-nav-sep';
    hudNav.appendChild(sep);
  }

  if (n.prev && n.prev.url) {
    const a = document.createElement('a');
    a.href = n.prev.url;
    a.innerHTML = `<svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>${n.prev.label}`;
    hudNav.appendChild(a);
    navSep();
  }

  if (n.index) {
    const idx = document.createElement('a');
    idx.href = n.index;
    idx.className = 'hud-nav-index';
    idx.textContent = 'All Work';
    hudNav.appendChild(idx);
  }

  if (n.next && n.next.url) {
    navSep();
    const a = document.createElement('a');
    a.href = n.next.url;
    a.innerHTML = `${n.next.label}<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    hudNav.appendChild(a);
  }

  const heroTitle = document.getElementById('hero-title');
  const heroText = CONFIG.heroLine2
    ? CONFIG.heroLine1 + '\n' + CONFIG.heroLine2
    : CONFIG.heroLine1;
  heroTitle.innerHTML = CONFIG.heroLine2
    ? CONFIG.heroLine1 + '<br>' + CONFIG.heroLine2
    : CONFIG.heroLine1;
  heroTitle.setAttribute('data-text', heroText);
  document.getElementById('hero-sub').textContent = CONFIG.heroSub;

  /* ── Section builders ── */
  const main = document.getElementById('scroll-content');

  function appendSection(inner, sectionCls) {
    const s  = el('section', sectionCls || 'content-section');
    const si = el('div', 'section-inner');
    si.appendChild(inner);
    s.appendChild(si);
    main.appendChild(s);
  }

  function makeTextBlock(children, showChapter, chapterText) {
    const tb = el('div', 'text-block');
    if (showChapter && chapterText) tb.appendChild(el('p', 'section-label', chapterText));
    children.forEach(c => tb.appendChild(c));
    return tb;
  }

  /* Pull quote */
  if (CONFIG.sections.pullQuote) {
    const pq = el('div', 'pull-quote');
    pq.appendChild(el('blockquote', '', CONFIG.content.pullQuote));
    pq.appendChild(el('cite', '', CONFIG.content.pullQuoteCite));
    appendSection(makeTextBlock([pq]));
  }

  /* Intro */
  if (CONFIG.sections.intro) {
    const c = CONFIG.content.intro;
    let inner;
    if (c.layout === 'stacked') {
      /* Full-width stacked: label → h2 → body, no two-col split */
      inner = el('div', 'intro-stacked');
      inner.appendChild(el('h2', '', c.heading));
      inner.appendChild(el('p', '', c.body));
    } else {
      /* Default: two-col, heading left, body right */
      inner = el('div', 'two-col');
      inner.appendChild(el('h2', '', c.heading));
      inner.appendChild(el('p', '', c.body));
    }
    appendSection(makeTextBlock([inner], c.showChapter, c.chapter));
  }

  /* Text + image right */
  if (CONFIG.sections.textImageR) {
    const c  = CONFIG.content.textImageR;
    const ti = el('div', 'text-image-right');
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    ti.appendChild(tt); ti.appendChild(td);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Full width image */
  if (CONFIG.sections.fullbleed) {
    const c  = CONFIG.content.fullbleed;
    const s  = el('section', 'content-section section-fullbleed');
    const fw = el('div', 'fullbleed-wrap');
    fw.appendChild(mkImg(c.image, c.caption));
    if (c.caption) fw.appendChild(el('span', 'fullbleed-caption', c.caption));
    s.appendChild(fw);
    main.appendChild(s);
  }

  /* Timeline */
  if (CONFIG.sections.timeline) {
    const c  = CONFIG.content.timeline;
    const s  = el('section', 'timeline-section');
    const ti = el('div', 'timeline-inner');
    const tb = el('div', 'text-block');
    if (c.showChapter && c.chapter) tb.appendChild(el('p', 'section-label', c.chapter));
    const th = el('div', 'timeline-header');
    th.appendChild(el('h2', '', c.heading));
    tb.appendChild(th);
    const steps = el('div', 'timeline-steps');
    c.steps.forEach(step => {
      const content = el('div', 'timeline-content');
      content.appendChild(el('p', 'timeline-step-label', step.n));
      content.appendChild(el('h3', '', step.title));
      content.appendChild(el('p', '', step.body));
      if (step.image) {
        const si = el('div', 'step-image');
        si.appendChild(mkImg(step.image, step.title));
        content.appendChild(si);
      }
      steps.appendChild(content);
    });
    tb.appendChild(steps);
    ti.appendChild(tb);
    s.appendChild(ti);
    main.appendChild(s);
  }

  /* Text + image left */
  if (CONFIG.sections.textImageL) {
    const c  = CONFIG.content.textImageL;
    const ti = el('div', 'text-image-left');
    const td = el('div', 'ti-image');
    td.appendChild(mkImg(c.image, c.imageAlt));
    const tt = el('div', 'ti-text');
    tt.appendChild(el('h2', '', c.heading));
    tt.appendChild(el('p', '', c.body));
    ti.appendChild(td); ti.appendChild(tt);
    appendSection(makeTextBlock([ti], c.showChapter, c.chapter));
  }

  /* Annotated / Badge diagram */
  if (CONFIG.sections.annotated) {
    const c = CONFIG.content.annotated;
    const s = document.createElement('section');
    s.className = 'annotated-section';
    const ai = document.createElement('div');
    ai.className = 'annotated-inner';
    const ab = document.createElement('div');
    ab.className = 'annotated-block';

    if (c.showChapter && c.chapter) ab.appendChild(el('p', 'annotated-label', c.chapter));

    /* Ghost badge — path from CONFIG */
    const ghost = document.createElement('div');
    ghost.className = 'badge-ghost';
    ghost.innerHTML = `<img src="${c.ghostImage}" alt="">`;
    ab.appendChild(ghost);

    const diagram = document.createElement('div');
    diagram.className = 'annotated-diagram';

    c.items.forEach((item, idx) => {

    appendSection(makeTextBlock([tc, sr], c.showChapter, c.chapter));
  }

  /* ── Panels ── */
  const P = CONFIG.panels || {};

  if (P.badgeSheet) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block rn-panel');

  if (P.sbsVariants) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block sbs-panel');
    i.innerHTML = `
      <span class="panel-label">Full Colour</span>
      <h2 class="panel-heading">Badge Variants</h2>
      <div class="sbs-image-wrap">
        <img src="images/SBS_Badges.webp" alt="SBS badge variants — olive drab, full colour, line work" loading="lazy">
      </div>
      <div class="sbs-captions">
        <div class="sbs-caption-col">
          <span class="sbs-caption-col__label">Olive Drab</span>

        </div>
        <div class="sbs-caption-col">
          <span class="sbs-caption-col__label">Full Colour</span>

        </div>
        <div class="sbs-caption-col">
          <span class="sbs-caption-col__label">Line Work</span>
          <p class="sbs-caption-col__text">Technical drawing version</p>
        </div>
      </div>
    `;
    s.appendChild(i); main.appendChild(s);
  }

  if (P.hqComfor) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block hq-panel');
    i.innerHTML = `
      <div class="hq-intro">
        <div class="hq-intro-text">
          <span class="panel-label">Full Colour</span>
          <h2 class="panel-heading">HQ Commando<br>Forces</h2>
          <p class="panel-body">
            Commissioned whilst working at the MOD embedded with the Royal Navy.
            The brief called for a new badge for HQ Commando Forces — unifying the
            lightning bolt, commando dagger and naval trident beneath the King's Crown.
          </p>
        </div>
        <div class="hq-intro-badge">
          <img src="images/badge-hq.png" alt="HQ Commando Forces badge" loading="lazy">
        </div>
      </div>
      <div class="hq-components">
        <h3 class="hq-section-heading">Components</h3>
        <div class="hq-row">
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-lightning.png" alt="Lightning" loading="lazy"></div><span class="hq-item__label">Lightning</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-dagger.png" alt="Commando Dagger" loading="lazy"></div><span class="hq-item__label">Commando Dagger</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-trident.png" alt="Trident" loading="lazy"></div><span class="hq-item__label">Trident</span></div>
        </div>
      </div>
      <div class="hq-colourways">
        <h3 class="hq-section-heading">Shield Colour Ways</h3>
        <div class="hq-row">
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-1.png" alt="Shield colourway 1" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-2.png" alt="Shield colourway 2" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-3.png" alt="Shield colourway 3" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
        </div>
      </div>
      <div class="hq-palette">
        <div class="hq-palette__dots">
          <span class="palette-dot dot-1"></span>
          <span class="palette-dot dot-2"></span>
          <span class="palette-dot dot-3"></span>
          <span class="palette-dot dot-4"></span>
        </div>
        <span class="hq-palette__label">Colour Palette</span>
      </div>
    `;
    s.appendChild(i); main.appendChild(s);
  }

  if (P.software) {
    const c = CONFIG.content.software || {};
    const logos = c.logos || [
      { src: "images/AdobeLogo.png",  name: "" },
      { src: "images/Luma Logo.png",  name: "" },
      { src: "images/GeminiLogo.png", name: "" },
      { src: "images/ClaudeLogo.png", name: "" },
    ];
    const caption = c.caption || "Vector work produced in Adobe Illustrator. 3D renders generated with Luma AI. Research assisted by Claude.";

    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block sw-panel');
    const logoHTML = logos.map(l =>
      `<div class="sw-logo">
        <img class="sw-logo__icon" src="${l.src}" alt="${l.name}">
        <span class="sw-logo__name">${l.name}</span>
      </div>`
    ).join('');
    i.innerHTML = `
      <span class="sw-panel__label">Software / Apps</span>
      <div class="sw-panel__logos">${logoHTML}</div>
      <p class="sw-panel__caption">${caption}</p>

    s.appendChild(i); main.appendChild(s);
  }

  /* Footer */
  const footer = el('footer');
  const btt = document.createElement('button');
  btt.id = 'back-to-top';
  btt.setAttribute('aria-label', 'Back to top');
  btt.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>`;
  btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  footer.appendChild(btt);
  footer.appendChild(el('span', 'footer-wordmark', CONFIG.wordmark));
  footer.appendChild(el('p', '', CONFIG.footerCaption));
  main.appendChild(footer);

  /* ══════════════════════════════════════════════════════
     SCROLL + VIDEO
     rAF-batched seek: one write per animation frame max.
     Direct currentTime assignment works in all browsers
     including Safari. fastSeek() is excluded — it causes
     Safari to drop to keyframe-only seeking which breaks
     smooth scrubbing on short videos.
  ══════════════════════════════════════════════════════ */
  const video       = document.getElementById('bg-video');
  const progressBar = document.getElementById('progress-bar');
  const scrollCue   = document.getElementById('scroll-cue');
  const pct         = document.getElementById('progress-pct');
  const loading     = document.getElementById('loading');
  const hudBar      = document.getElementById('hud-bar');

  video.addEventListener('loadedmetadata', () => loading.classList.add('hidden'));
  if (video.readyState >= 1) loading.classList.add('hidden');
  setTimeout(() => loading.classList.add('hidden'), 3000);

  let rafPending   = false;
  let targetTime   = 0;
  let lastProgress = -1;

  function applyVideoSeek() {
    rafPending = false;
    if (!video.duration || !isFinite(video.duration)) return;
    /* Only seek if delta is meaningful — avoids micro-jitter */
    if (Math.abs(video.currentTime - targetTime) > 0.04) {
      video.currentTime = targetTime;
    }
  }

  function onScroll() {
    const scrollTop = window.scrollY;
    const scrollMax = document.body.scrollHeight - window.innerHeight;
    const progress  = Math.min(Math.max(scrollTop / scrollMax, 0), 1);

    if (video.duration && isFinite(video.duration) && video.offsetParent !== null) {
      targetTime = progress * video.duration;
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(applyVideoSeek);
      }
    }

    if (progress !== lastProgress) {
      video.style.opacity = 1 - (progress * 0.9);
      progressBar.style.width = (progress * 100) + '%';
      pct.textContent = Math.round(progress * 100) + '%';
      lastProgress = progress;
    }

    scrollCue.style.opacity = scrollTop > 40 ? '0' : '1';
    hudBar.classList.toggle('scrolled', scrollTop > 40);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lightbox-img');
  const lbDots  = document.getElementById('lightbox-dots');
  let current   = 0;

  function getItems() { return Array.from(document.querySelectorAll('.gallery-item')); }

  function buildDots(count) {
    lbDots.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const d = document.createElement('span');
      d.className = 'lb-dot' + (i === current ? ' active' : '');
      d.addEventListener('click', () => showSlide(i));
      lbDots.appendChild(d);
    }
  }

  function updateDots() {
    Array.from(lbDots.children).forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  function openLightbox(i) {
    const items = getItems();
    current = i;
    lbImg.src = items[i].querySelector('img').src;
    buildDots(items.length);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showSlide(i) {
    const items = getItems();
    current = (i + items.length) % items.length;
    lbImg.src = items[current].querySelector('img').src;
    updateDots();
  }

  document.addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (item) openLightbox(+item.dataset.index);
  });

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); showSlide(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); showSlide(current + 1); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showSlide(current - 1);
    if (e.key === 'ArrowRight') showSlide(current + 1);
  });

  /* ── Stat animation ── */
  function countUp(numEl, target, duration) {
    const isFloat = target % 1 !== 0;
    const start   = performance.now();
    function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val  = target * ease;
      numEl.textContent = isFloat ? val.toFixed(1) : Math.round(val);
      if (t < 1) requestAnimationFrame(tick);
      else numEl.textContent = isFloat ? target.toFixed(1) : target;
    }
    requestAnimationFrame(tick);
  }

  const statObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const st    = entry.target;
      const delay = +st.dataset.delay || 0;
      setTimeout(() => {
        st.classList.add('fired');
        const numEl  = st.querySelector('h4');
        const target = parseFloat(numEl.dataset.countTo);
        countUp(numEl, target, 1200);
      }, delay);
      statObserver.unobserve(st);
    });
  }, { threshold: 0.3 });

  /* ── Scroll reveal ── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  requestAnimationFrame(() => {
    document.querySelectorAll(
      '.text-block, .ti-image img, .fullbleed-wrap img, .step-image img, .gallery-item, .timeline-content, .pull-quote'
    ).forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
    document.querySelectorAll('.stat').forEach(st => statObserver.observe(st));

    /* Panel image + logo reveals */
    document.querySelectorAll('.panel-section img, .sw-logo').forEach((el, i) => {
      el.style.transitionDelay = (i % 4 * 0.12) + 's';
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
  });

  /* ── Hamburger / mobile menu ── */
  const hamburger    = document.getElementById('hamburger');
  const mobileMenu   = document.getElementById('mobile-menu');
  const menuClose    = document.getElementById('mobile-menu-close');
  const menuNav      = document.getElementById('mobile-menu-nav');

  /* Build mobile nav from CONFIG */
  const mLinks = [];
  if (CONFIG.nav.prev && CONFIG.nav.prev.url)
    mLinks.push({ label: '← ' + CONFIG.nav.prev.label, url: CONFIG.nav.prev.url });
  if (CONFIG.nav.index)
    mLinks.push({ label: 'All Work', url: CONFIG.nav.index });
  if (CONFIG.nav.next && CONFIG.nav.next.url)
    mLinks.push({ label: CONFIG.nav.next.label + ' →', url: CONFIG.nav.next.url });

  mLinks.forEach(link => {
    const a = document.createElement('a');
    a.href = link.url;
    a.textContent = link.label;
    a.addEventListener('click', closeMenu);
    menuNav.appendChild(a);
  });

  function openMenu() { mobileMenu.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeMenu() { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; }

  if (hamburger) hamburger.addEventListener('click', openMenu);
  if (menuClose) menuClose.addEventListener('click', closeMenu);
  mobileMenu.addEventListener('click', e => { if (e.target === mobileMenu) closeMenu(); });
  </script>
