<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    :root {
      --cream: #f5f0e8;
      --dark: #0a0a0f;
      --accent: #c8a96e;
      --muted: rgba(245, 240, 232, 0.55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    #video-stage {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh; z-index: 0;
    }

    #bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #video-stage::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(10,10,15,0.5) 100%),
        linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, transparent 15%, transparent 80%, rgba(10,10,15,0.7) 100%);
      pointer-events: none;
    }

    #progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #e8d5a3);
      z-index: 100; transition: width 0.05s linear;
    }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #hud-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      background: rgba(10,10,15,0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      border-bottom: 1px solid rgba(200,169,110,0);
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease;
      pointer-events: all;
    }

    .caption-top {
      margin-left: auto;
    }

    #hud-bar.scrolled {
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom-color: rgba(200,169,110,0.1);
    }

    /* Prev / next nav in HUD */
    .hud-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      pointer-events: all;
    }

    .hud-nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      padding: 0.3rem 0;
    }

    .hud-nav a:hover { color: var(--accent); }

    .hud-nav a svg {
      width: 12px; height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .hud-nav-sep {
      width: 1px;
      height: 12px;
      background: rgba(200,169,110,0.2);
    }

    .hud-nav-index {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.4);
      text-decoration: none;
      transition: color 0.2s;
      pointer-events: all;
    }

    .hud-nav-index:hover { color: var(--accent); }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0.18em; color: var(--cream); opacity: 0.9;
    }

    .caption-top {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #progress-pct {
      position: absolute; bottom: 2.8rem; right: 3rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.18em;
      color: var(--accent); opacity: 0.85;
    }

    #scroll-cue {
      position: absolute; bottom: 2.8rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s ease;
    }

    #scroll-cue span {
      font-size: 0.62rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }

    .scroll-arrow {
      width: 18px; height: 18px;
      border-right: 1.5px solid var(--accent);
      border-bottom: 1.5px solid var(--accent);
      transform: rotate(45deg);
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 1; }
      50%       { transform: rotate(45deg) translate(4px,4px); opacity: 0.5; }
    }

    #scroll-content { position: relative; z-index: 10; }

    #hero {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    #hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 12rem);
      line-height: 0.9; letter-spacing: 0.04em; color: var(--cream);
      position: relative;
    }

    #hero h1::before {
      display: none;
    }

  #hero h1 {
      filter: drop-shadow(0 10px 10px rgba(0,0,0,1));
    }

    #hero p {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent);
      background: rgba(10,10,15,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 0.45rem 1.2rem;
      border-radius: 1px;
    }

    .content-section { padding: 7rem 0; }

    .section-inner { max-width: 1000px; margin: 0 auto; padding: 0 3rem; }

    .text-block {
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 2px; padding: 3.5rem 4rem;
    }

    .section-label {
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem;
    }

    .section-inner h2, .timeline-header h2, .gallery-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.92; letter-spacing: 0.04em;
      color: var(--cream); margin-bottom: 2.5rem;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3rem; margin-top: 3rem; }

    .content-section p, .timeline-content p {
      font-size: 1rem; line-height: 1.85; color: var(--muted); font-weight: 300;
    }

    .card { border-top: 1px solid rgba(200,169,110,0.25); padding-top: 2rem; }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.08em;
      color: var(--cream); margin-bottom: 1rem;
    }

    .stat-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 2rem; margin-top: 3rem;
      border-top: 1px solid rgba(200,169,110,0.12); padding-top: 3rem;
    }

    .stat {
      display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem;
    }

    .stat-icon {
      width: 48px; height: 48px;
      margin-bottom: 0.25rem;
    }

    .stat-icon svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    .stat-icon svg path, .stat-icon svg circle, .stat-icon svg line, .stat-icon svg polyline {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--dash-len, 200);
      stroke-dashoffset: var(--dash-len, 200);
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat.fired .stat-icon svg path,
    .stat.fired .stat-icon svg circle,
    .stat.fired .stat-icon svg line,
    .stat.fired .stat-icon svg polyline {
      stroke-dashoffset: 0;
    }

    .stat h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--accent); letter-spacing: 0.04em; line-height: 1;
      opacity: 0; transition: opacity 0.4s ease 0.5s;
    }

    .stat.fired h4 { opacity: 1; }

    .stat p {
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-top: 0.1rem;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease 0.7s, transform 0.4s ease 0.7s;
    }

    .stat.fired p { opacity: 1; transform: translateY(0); }

    .text-image-right, .text-image-left {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;
    }

    .text-image-right .ti-text h2,
    .text-image-left .ti-text h2 { margin-bottom: 1.5rem; }

    .text-image-right .ti-image img,
    .text-image-left .ti-image img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; border-radius: 2px; display: block;
    }

    .text-image-left .ti-image { order: -1; }

    .section-fullbleed { padding: 7rem 0; }

    .fullbleed-wrap { position: relative; max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .fullbleed-wrap img {
      width: 100%; max-height: 85vh;
      object-fit: cover; display: block; border-radius: 2px;
    }

    .fullbleed-caption {
      position: absolute; bottom: 1rem; right: 3.75rem;
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      background: rgba(10,10,15,0.5); backdrop-filter: blur(6px);
      padding: 0.4rem 0.8rem; border-radius: 1px;
    }

    .pull-quote { padding: 0.5rem 0; max-width: 900px; margin: 0 auto; }

    .pull-quote blockquote {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05; letter-spacing: 0.03em; color: var(--cream);
      border-left: 2px solid var(--accent); padding-left: 2.5rem;
    }

    .pull-quote cite {
      display: block; margin-top: 1.5rem; padding-left: 2.5rem;
      font-size: 0.68rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--accent); font-style: normal;
    }

    .gallery-section { padding: 7rem 0; }

    .gallery-inner { max-width: 1200px; margin: 0 auto; padding: 0 3rem; }

    .gallery-header { margin-bottom: 2.5rem; }

    .gallery-label {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
    }

    .gallery-grid { columns: 3; column-gap: 0.75rem; }

    .gallery-item {
      break-inside: avoid; margin-bottom: 0.75rem;
      position: relative; overflow: hidden; cursor: pointer;
    }

    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-item::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,15,0); transition: background 0.3s ease;
    }

    .gallery-item:hover::after { background: rgba(10,10,15,0.25); }

    #lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,10,15,0.95); backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 2px; }

    #lightbox-close {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 1.5rem; color: var(--muted);
      cursor: pointer; background: none; border: none; line-height: 1; transition: color 0.2s;
    }

    #lightbox-close:hover { color: var(--cream); }

    #lightbox-prev, #lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(200,169,110,0.2);
      color: var(--accent); font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.15em;
      padding: 0.6rem 1rem; cursor: pointer; transition: border-color 0.2s; border-radius: 1px;
    }

    #lightbox-prev { left: 2rem; }
    #lightbox-next { right: 2rem; }
    #lightbox-prev:hover, #lightbox-next:hover { border-color: var(--accent); color: var(--cream); }

    #lightbox-count {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.22em; color: var(--muted);
    }

    .timeline-section { padding: 7rem 0; }

    .timeline-inner { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .timeline-header { margin-bottom: 4rem; }

    .timeline-track { display: grid; grid-template-columns: 60px 1fr; gap: 0 2.5rem; }

    .timeline-spine { display: flex; flex-direction: column; align-items: center; }

    .timeline-node {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem;
      letter-spacing: 0.1em; color: var(--accent); flex-shrink: 0;
      /*background: rgba(10,10,15,0.8); backdrop-filter: blur(4px);*/
    }

    .timeline-line {
      width: 1px; flex: 1; min-height: 3rem;
      background: linear-gradient(to bottom, rgba(200,169,110,0.3), rgba(200,169,110,0.05));
      margin: 0.5rem 0;
    }

    .timeline-content { padding-bottom: 4rem; }

    .timeline-content h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      letter-spacing: 0.06em; color: var(--cream);
      line-height: 1; margin-bottom: 1rem; margin-top: 0.4rem;
    }

    .timeline-content .step-image { margin-top: 1.5rem; max-width: 580px; }
    .timeline-content .step-image img { width: 100%; border-radius: 2px; display: block; }

    footer {
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(200,169,110,0.12);
      padding: 5rem 3rem; text-align: center;
      position: relative; z-index: 10;
    }

    footer .footer-wordmark {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 0.18em;
      color: var(--cream); opacity: 0.15; margin-bottom: 1rem;
    }

    footer p {
      font-size: 0.68rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
    }

    #loading {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 200; transition: opacity 0.6s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 1.5px solid rgba(200,169,110,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading span {
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
    }

    @media (max-width: 768px) {
      .two-col, .text-image-right, .text-image-left { grid-template-columns: 1fr; gap: 2rem; }
      .three-col { grid-template-columns: 1fr; }
      .text-image-left .ti-image { order: 0; }
      .gallery-grid { columns: 2; }
      .text-block { padding: 2.5rem 2rem; }
      .caption-top { display: none; }
      #progress-pct { bottom: 1.5rem; right: 1.5rem; }
      #hud-bar { padding: 1.5rem; }
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-item.reveal { transition-duration: 0.6s; }
    .gallery-item.reveal:nth-child(2) { transition-delay: 0.08s; }
    .gallery-item.reveal:nth-child(3) { transition-delay: 0.16s; }
    .gallery-item.reveal:nth-child(4) { transition-delay: 0.06s; }
    .gallery-item.reveal:nth-child(5) { transition-delay: 0.14s; }
    .gallery-item.reveal:nth-child(6) { transition-delay: 0.22s; }
    .gallery-item.reveal:nth-child(7) { transition-delay: 0.04s; }
    .gallery-item.reveal:nth-child(8) { transition-delay: 0.12s; }
    .gallery-item.reveal:nth-child(9) { transition-delay: 0.20s; }

    .timeline-content.reveal:nth-child(4)  { transition-delay: 0.10s; }
    .timeline-content.reveal:nth-child(6)  { transition-delay: 0.15s; }
    .timeline-content.reveal:nth-child(8)  { transition-delay: 0.20s; }
    .timeline-content.reveal:nth-child(10) { transition-delay: 0.25s; }

    /* ── Panel image reveals ── */
   .panel-section img {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .sw-logo {
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    

    .panel-section img.visible,
    .sw-logo.visible {
      opacity: 1;
      transform: translateY(0);
    }

   .sw-logo { transform: translateX(0px); }
   .sw-logo.visible { transform: translateX(0); }

    /* ── Panels ── */
.panel-section {
  padding: 7rem 0;
  position: relative;
  z-index: 10;
}

.panel-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 3rem;
}

.panel-label {
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 1.2rem;
}

.panel-heading {
  font-family: 'Bebas Neue', sans-serif;
  line-height: 0.92;
  letter-spacing: 0.04em;
  color: var(--cream);
}

.panel-body {
  font-size: 1rem;
  line-height: 1.85;
  color: var(--muted);
  font-weight: 300;
}

.panel-rule {
  border: none;
  border-top: 1px solid rgba(245,240,232,0.12);
  margin: 4rem 0;
}

/* Panel A — Royal Navy */
.rn-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 2rem; }
.rn-panel .panel-body    { max-width: 68ch; margin-bottom: 4rem; }

.rn-badge-primary  { display: flex; justify-content: center; padding: 0 60px; }
.rn-badge-primary img  { width: 100%; max-width: 520px; height: auto; display: block; }

.rn-symmetry-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 0.1em;
  color: var(--cream); text-align: center;
  display: block; margin-bottom: 1rem;
}

.rn-symmetry-caption {
  font-size: 0.85rem; font-weight: 300;
  color: var(--muted); text-align: center;
  display: block; margin-bottom: 3rem;
}

.rn-badge-secondary { display: flex; justify-content: center; padding: 0 120px; }
.rn-badge-secondary img { width: 100%; max-width: 360px; height: auto; display: block; }

/* Panel B — SBS */
.sbs-panel .panel-heading { font-size: clamp(3rem, 7vw, 6rem); margin-bottom: 3rem; }

.sbs-image-wrap { width: 100%; margin-bottom: 2.5rem; }
.sbs-image-wrap img { width: 100%; height: auto; display: block; }

.sbs-captions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.sbs-caption-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 0.6rem;
  padding: 0 1rem;
}

.sbs-caption-col__label {
  font-size: 0.65rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--accent);
  text-align: center;
}

.sbs-caption-col__text {
  font-size: 0.9rem; font-weight: 300;
  color: var(--muted); text-align: center; line-height: 1.55;
}

/* Panel C — HQCOMFOR */
.hq-intro {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4rem; align-items: start; margin-bottom: 5rem;
}

.hq-intro-text { display: flex; flex-direction: column; }
.hq-intro-text .panel-heading { font-size: clamp(2.5rem, 5vw, 5rem); margin-bottom: 1.5rem; }

.hq-intro-badge { display: flex; justify-content: center; }
.hq-intro-badge img { width: 100%; max-width: 320px; height: auto; display: block; }

.hq-section-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 0.1em;
  color: var(--cream); text-align: center; margin-bottom: 3rem;
}

.hq-row { display: grid; grid-template-columns: repeat(3,1fr); margin-bottom: 5rem; }

.hq-item { display: flex; flex-direction: column; align-items: center; }

.hq-item__image-wrap {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
}

.hq-components .hq-item__image-wrap { height: 200px; }
.hq-components .hq-item__image-wrap img { max-height: 180px; max-width: 90px; width: auto; height: auto; display: block; }

.hq-colourways .hq-item__image-wrap { height: 175px; }
.hq-colourways .hq-item__image-wrap img { max-height: 155px; max-width: 155px; width: auto; height: auto; display: block; }

.hq-item__label {
  font-size: 0.65rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--muted); text-align: center;
}

.hq-palette { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.hq-palette__dots { display: flex; gap: 0.6rem; }

          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-lightning.png" alt="Lightning" loading="lazy"></div><span class="hq-item__label">Lightning</span></div>

          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/component-trident.png" alt="Trident" loading="lazy"></div><span class="hq-item__label">Trident</span></div>
        </div>
      </div>
      <div class="hq-colourways">
        <h3 class="hq-section-heading">Shield Colour Ways</h3>
        <div class="hq-row">
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-1.png" alt="Shield colourway 1" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-2.png" alt="Shield colourway 2" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
          <div class="hq-item"><div class="hq-item__image-wrap"><img src="images/shield-colourway-3.png" alt="Shield colourway 3" loading="lazy"></div><span class="hq-item__label">Full Colour</span></div>
        </div>
      </div>
      <div class="hq-palette">
        <div class="hq-palette__dots">
          <span class="palette-dot dot-1"></span>
          <span class="palette-dot dot-2"></span>
          <span class="palette-dot dot-3"></span>
          <span class="palette-dot dot-4"></span>
        </div>
        <span class="hq-palette__label">Colour Palette</span>
      </div>
    `;
    s.appendChild(i); main.appendChild(s);
  }

  if (P.software) {
    const s = el('section', 'panel-section');
    const i = el('div', 'section-inner text-block sw-panel');
    i.innerHTML = `
      <span class="sw-panel__label">Software / Apps</span>
      <div class="sw-panel__logos">
        <div class="sw-logo">
          <img class="sw-logo__icon" src="images/AdobeLogo.png" alt="">
          <span class="sw-logo__name"></span>
        </div>
        <div class="sw-logo">
      <img class="sw-logo__icon" src="images/Luma Logo.png" alt="">
          <span class="sw-logo__name"></span>
        </div>
        <div class="sw-logo">
          <img class="sw-logo__icon" src="images/GeminiLogo.png" alt="">
          <span class="sw-logo__name"></span>
        </div>
        <div class="sw-logo">
          <img class="sw-logo__icon" src="images/ClaudeLogo.png" alt="">
          <span class="sw-logo__name"></span>
        </div>
      </div>
      <p class="sw-panel__caption">
        Vector work produced in Adobe Illustrator. 3D photorealistic renders generated
        with Adobe Photoshop and Luma AI. Research and design iteration assisted by Gemini and Claude. No AI is utilised in Adobe Illustrator, all vectors are hand drawn.
      </p>
    `;
    s.appendChild(i); main.appendChild(s);
  }

  /* Footer */
  const footer = el('footer');
  footer.appendChild(el('span', 'footer-wordmark', CONFIG.wordmark));
  footer.appendChild(el('p', '', CONFIG.footerCaption));
  main.appendChild(footer);

  /* ── Scroll + video ── */
  const video       = document.getElementById('bg-video');
  const progressBar = document.getElementById('progress-bar');
  const scrollCue   = document.getElementById('scroll-cue');
  const pct         = document.getElementById('progress-pct');
  const loading     = document.getElementById('loading');
  const hudBar      = document.getElementById('hud-bar');

  video.addEventListener('loadedmetadata', () => loading.classList.add('hidden'));
  if (video.readyState >= 1) loading.classList.add('hidden');
  setTimeout(() => loading.classList.add('hidden'), 3000);

  function onScroll() {
    const scrollTop = window.scrollY;
    const scrollMax = document.body.scrollHeight - window.innerHeight;
    const progress  = Math.min(Math.max(scrollTop / scrollMax, 0), 1);
    if (video.duration && isFinite(video.duration)) {
      const target = progress * video.duration;
      if (Math.abs(video.currentTime - target) > 0.01) video.currentTime = target;
    }
    video.style.opacity = 1 - (progress * 0.9);
    progressBar.style.width = (progress * 100) + '%';
    pct.textContent = Math.round(progress * 100) + '%';
    scrollCue.style.opacity = scrollTop > 40 ? '0' : '1';
    hudBar.classList.toggle('scrolled', scrollTop > 40);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lightbox-img');
  const lbCount = document.getElementById('lightbox-count');
  let current   = 0;

  function getItems() { return Array.from(document.querySelectorAll('.gallery-item')); }

  function openLightbox(i) {
    const items = getItems();
    current = i;
    lbImg.src = items[i].querySelector('img').src;
    lbCount.textContent = (i + 1) + ' / ' + items.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showSlide(i) {
    const items = getItems();
    current = (i + items.length) % items.length;
    lbImg.src = items[current].querySelector('img').src;
    lbCount.textContent = (current + 1) + ' / ' + items.length;
  }

  document.addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (item) openLightbox(+item.dataset.index);
  });

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); showSlide(current - 1); });
  document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); showSlide(current + 1); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showSlide(current - 1);
    if (e.key === 'ArrowRight') showSlide(current + 1);
  });

  /* ── Stat animation ── */
  function countUp(numEl, target, duration) {
    const isFloat = target % 1 !== 0;
    const start   = performance.now();
    function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val  = target * ease;
      numEl.textContent = isFloat ? val.toFixed(1) : Math.round(val);
      if (t < 1) requestAnimationFrame(tick);
      else numEl.textContent = isFloat ? target.toFixed(1) : target;
    }
    requestAnimationFrame(tick);
  }

  const statObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const st    = entry.target;
      const delay = +st.dataset.delay || 0;
      setTimeout(() => {
        st.classList.add('fired');
        const numEl  = st.querySelector('h4');
        const target = parseFloat(numEl.dataset.countTo);
        countUp(numEl, target, 1200);
      }, delay);
      statObserver.unobserve(st);
    });
  }, { threshold: 0.3 });

  /* ── Scroll reveal ── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });



  // Observe after sections are built
  requestAnimationFrame(() => {
    document.querySelectorAll(
      '.text-block, .ti-image img, .fullbleed-wrap img, .step-image img, .gallery-item, .timeline-content, .pull-quote'
    ).forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
    document.querySelectorAll('.stat').forEach(st => statObserver.observe(st));
    requestAnimationFrame(() => {
    document.querySelectorAll(
      '.text-block, .ti-image img, .fullbleed-wrap img, .step-image img, .gallery-item, .timeline-content, .pull-quote'
    ).forEach(el => {
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
    document.querySelectorAll('.stat').forEach(st => statObserver.observe(st));

// ── Panel reveals ──
    document.querySelectorAll('.panel-section img, .sw-logo').forEach((el, i) => {
      el.style.transitionDelay = (i % 4 * 0.12) + 's';
      el.classList.add('reveal');
      revealObserver.observe(el);
    });
  });
  });
  </script>

</body>
